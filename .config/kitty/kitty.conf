term xterm-256color
#font_family      Fira Code
#font_family      MxPlus ToshibaTxL1 8x16
font_family      Mx437 IBM PS/55 re.
font_size 23.0
cursor_shape block
shell_integration no-cursor
background_opacity         1
disable_ligatures always
confirm_os_window_close 0

cursor_trail 1
cursor_trail_decay 0.1 0.35
cursor_trail_start_threshold 2

#background            #000000
background            #001010
cursor                #dedede
foreground            #ddeedd
include dark-theme.auto.conf
